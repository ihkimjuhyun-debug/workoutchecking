<div id="record-view" class="view-section">
      <h2 id="current-categories-title">운동 기록</h2>
      
      <div id="exercise-inputs-container">
        <div class="exercise-entry record-card mb-20" style="position:relative;">
          <div class="input-group mt-10">
            <label>운동 종목</label>
            <input type="text" class="input-name" placeholder="예: OHP, 벤치프레스">
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>무게 (kg)</label>
              <input type="number" class="input-weight" placeholder="0">
            </div>
            <div class="input-group">
              <label>횟수 (회)</label>
              <input type="number" class="input-reps" placeholder="0">
            </div>
            <div class="input-group">
              <label>세트 (세트)</label>
              <input type="number" class="input-sets" placeholder="0">
            </div>
          </div>
        </div>
      </div>

      <button class="secondary-btn mb-20" onclick="addExerciseInput()">➕ 다른 종목 추가하기</button>

      <div class="action-buttons">
        <button class="primary-btn" onclick="saveRecord('now')">지금 운동 기록하기 (현재 시간)</button>
        <button class="secondary-btn mt-10" onclick="togglePastDateInput()">운동 후 과거 일지 기록하기</button>
      </div>

      <div id="past-date-container" style="display: none; margin-top: 15px;">
        <input type="datetime-local" id="input-past-date" step="1"> <button class="primary-btn mt-10" onclick="saveRecord('past')">과거 기록 저장</button>
      </div>
    </div>

    <div id="search-view" class="view-section">
      <h2 style="margin-bottom: 20px;">🔍 종목 검색 및 카테고리</h2>
      <input type="text" id="search-input" placeholder="종목 이름 검색 (예: OHP)" onkeyup="searchExercises()">
      
      <div class="category-grid mt-20" id="filter-categories">
        <div class="cat-btn" onclick="filterByCategory('어깨', this)">어깨</div>
        <div class="cat-btn" onclick="filterByCategory('등', this)">등</div>
        <div class="cat-btn" onclick="filterByCategory('가슴', this)">가슴</div>
        <div class="cat-btn" onclick="filterByCategory('하체', this)">하체</div>
        <div class="cat-btn" onclick="filterByCategory('팔', this)">팔</div>
        <div class="cat-btn" onclick="filterByCategory('복근', this)">복근</div>
      </div>

      <div id="exercise-list" class="list-container mt-20"></div>
    </div>
