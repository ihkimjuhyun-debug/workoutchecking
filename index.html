<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite PR Tracker v9.0 (Ultimate AI)</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1 onclick="showView('home-view')">🔥 PR Tracker</h1>
      <nav>
        <button onclick="showView('search-view')">검색</button>
        <button onclick="showView('hof-view')">명예의전당</button>
        <button onclick="showView('goal-view')" style="color: var(--primary);">AI 목표</button>
        <button onclick="showView('settings-view')">⚙️ 설정</button>
      </nav>
    </header>

    <div id="home-view" class="view-section active">
      <h2>오늘의 운동 부위 선택</h2>
      <div class="category-grid mt-20" id="category-selection">
        <div class="cat-btn" data-cat="어깨">어깨</div><div class="cat-btn" data-cat="등">등</div>
        <div class="cat-btn" data-cat="가슴">가슴</div><div class="cat-btn" data-cat="하체">하체</div>
        <div class="cat-btn" data-cat="팔">팔</div><div class="cat-btn" data-cat="복근">복근</div>
        <div class="cat-btn" data-cat="케틀벨">케틀벨</div><div class="cat-btn" data-cat="유산소">유산소</div>
      </div>
      <button class="primary-btn mt-20" onclick="startWorkout()">운동 일지 기록 시작하기</button>
    </div>

    <div id="record-view" class="view-section">
      <h2 id="current-categories-title" class="mb-10">운동 기록</h2>
      <div id="quick-select-container" class="quick-card-container mb-20"></div>
      <div id="exercise-inputs-container"></div>
      <button class="secondary-btn mb-20" onclick="addExerciseInput()">➕ 종목 추가</button>
      <button class="primary-btn" onclick="saveRecord('now')">지금 저장</button>
      <button class="secondary-btn mt-10" onclick="togglePastDateInput()">과거 일지 기록</button>
      <div id="past-date-container" style="display: none; margin-top: 15px;">
        <input type="datetime-local" id="input-past-date">
        <button class="primary-btn mt-10" onclick="saveRecord('past')">과거 기록 저장</button>
      </div>
    </div>

    <div id="hof-view" class="view-section">
      <h2>🏆 명예의 전당</h2>
      <div class="hof-tabs mt-20 mb-20">
        <button class="hof-tab active" onclick="switchHofTab('volume')">볼륨 순위</button>
        <button class="hof-tab" onclick="switchHofTab('weight')">최고 무게</button>
      </div>
      <div id="hof-volume-list" class="list-container"></div>
    </div>

    <div id="search-view" class="view-section">
      <h2 class="mb-20">🔍 검색 및 종목 관리</h2>
      <div class="category-grid mb-20" id="filter-categories">
        <div class="cat-btn" data-filter="어깨">어깨</div><div class="cat-btn" data-filter="등">등</div>
        <div class="cat-btn" data-filter="가슴">가슴</div><div class="cat-btn" data-filter="하체">하체</div>
        <div class="cat-btn" data-filter="팔">팔</div><div class="cat-btn" data-filter="복근">복근</div>
        <div class="cat-btn" data-filter="케틀벨">케틀벨</div><div class="cat-btn" data-filter="유산소">유산소</div>
      </div>
      <input type="text" id="search-input" placeholder="종목 검색..." class="mb-20" onkeyup="searchExercises()">
      <div id="exercise-list" class="list-container"></div>
      <button class="secondary-btn mt-20" onclick="toggleCustomExerciseForm()">➕ 맞춤 종목/AI 썸네일 추가</button>
      <div id="custom-exercise-form" class="record-card" style="display: none; margin-top:15px;">
        <div class="input-group"><label>종목명</label><input type="text" id="custom-ex-name"></div>
        <div class="input-row">
          <div class="input-group"><label>카테고리</label><select id="custom-ex-cat" class="custom-select"><option value="케틀벨">케틀벨</option><option value="하체">하체</option><option value="가슴">가슴</option><option value="등">등</option><option value="어깨">어깨</option></select></div>
          <div class="input-group"><label>타겟</label><input type="text" id="custom-ex-target"></div>
        </div>
        <div id="ai-img-preview" style="display:none; text-align:center; margin:15px 0;"><img id="generated-img" style="width:60px; height:60px; border-radius:10px; border:2px solid var(--primary);"></div>
        <button class="secondary-btn mt-10" id="btn-gen-img" onclick="generateDalleIcon()">🎨 AI 썸네일 생성</button>
        <button class="primary-btn mt-10" onclick="addCustomExercise()">✅ 종목 최종 저장</button>
      </div>
    </div>

    <div id="history-view" class="view-section"><button class="secondary-btn mb-20" onclick="showView('search-view')">⬅ 뒤로</button><h2 id="history-title">기록 비교</h2><div id="history-list" class="list-container"></div></div>
    <div id="session-detail-view" class="view-section"><button class="secondary-btn mb-20" onclick="showView('hof-view')">⬅ 뒤로</button><h2 id="session-detail-title">세션 상세</h2><div id="session-workout-list" class="list-container"></div></div>

    <div id="goal-view" class="view-section">
      <div id="goal-setup-area">
        <h2 class="mb-20">🎯 1RM 기반 AI 루틴 설계</h2>
        <div class="record-card">
          <div class="input-group"><label>목표 종목명</label><input type="text" id="goal-name" placeholder="예: OHP, 데드리프트"></div>
          <label>🎯 최종 도달 목표 (중량 및 횟수)</label>
          <div class="input-row mb-10"><input type="number" id="goal-target-weight" placeholder="목표 무게(kg)"><input type="number" id="goal-target-reps" placeholder="목표 횟수(회)"></div>
          <label>🔥 현재 최대 기록 (수행 가능 범위)</label>
          <div class="input-row mb-10"><input type="number" id="goal-current-weight" placeholder="현재 무게(kg)"><input type="number" id="goal-current-reps" placeholder="현재 횟수(회)"></div>
          <div class="input-group"><label>훈련 기간</label><select id="goal-duration" class="custom-select"><option value="1">1개월</option><option value="3" selected>3개월</option><option value="6">6개월</option></select></div>
          <button class="primary-btn mt-20" id="btn-generate-routine" onclick="generateAIRoutines()">✨ 루틴 생성하기</button>
        </div>
        <div id="ai-loading" style="display: none; text-align: center; padding: 30px;"><div class="loader"></div><p class="mt-10" id="ai-loading-text">AI 코치가 1RM을 분석하여 루틴을 짜고 있습니다...</p></div>
        <div id="ai-routines-area" style="display: none;"><div id="ai-routines-list" class="list-container mt-20"></div><button class="primary-btn mt-20" onclick="startSelectedRoutine()" style="background:#4CAF50;">🚀 선택한 루틴 시작</button></div>
      </div>
      <div id="active-goal-area" style="display: none;">
        <h2 id="active-goal-title">진행 중인 목표</h2>
        <div class="record-card mt-10 mb-20">
          <p id="active-goal-desc" class="mb-10"></p>
          <div class="progress-bg"><div class="progress-fill" id="goal-progress-bar"></div></div>
          <p id="goal-progress-text" class="mt-10" style="font-weight:bold; color:var(--primary);"></p>
        </div>
        <div id="goal-sessions-list" class="list-container"></div>
        <button class="secondary-btn mt-20" onclick="resetGoal()" style="color:#ff4a4a; border-color:#ff4a4a;">목표 초기화</button>
      </div>
    </div>

    <div id="settings-view" class="view-section">
      <h2>⚙️ API 설정</h2>
      <div class="record-card mt-20">
        <label>OpenAI API Key</label>
        <input type="password" id="openai-key" placeholder="sk-...">
        <button class="primary-btn mt-10" onclick="saveApiKey()">키 저장</button>
      </div>
    </div>
  </div>

  <div id="toast-msg" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
